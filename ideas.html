<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideas · OnePiece</title>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/layout.css">
  <style>
    /* ── Filtros ─────────────────────────────────────────── */
    .filters-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-pill {
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: color .15s, background .15s, border-color .15s;
    }
    .filter-pill:hover  { color: var(--text); background: rgba(255,255,255,.06); transform: none; }
    .filter-pill.active { color: var(--text); background: rgba(110,168,255,.14); border-color: rgba(110,168,255,.4); }
    .filter-search {
      flex: 1;
      min-width: 180px;
      max-width: 280px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: .9rem;
    }
    .filter-spacer { flex: 1; }
    .ideas-count { color: var(--muted); font-size: .85rem; margin-top: 18px; }

    /* ── Idea card ───────────────────────────────────────── */
    .idea-card {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
    }
    .idea-card:hover { transform: translateY(-2px); box-shadow: 0 28px 60px rgba(0,0,0,.38); }

    .idea-accent {
      height: 3px;
      flex-shrink: 0;
      background: var(--line);
      transition: opacity .2s;
    }
    .tipo-arco      .idea-accent { background: var(--accent);  }
    .tipo-personaje .idea-accent { background: var(--pink);    }
    .tipo-tema      .idea-accent { background: var(--yellow);  }
    .tipo-conexion  .idea-accent { background: var(--green);   }

    .idea-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .idea-meta { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }

    .idea-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    .idea-hook {
      font-size: .86rem;
      color: var(--accent);
      font-style: italic;
      line-height: 1.5;
      margin: 0;
      border-left: 2px solid rgba(110,168,255,.35);
      padding-left: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .idea-text {
      font-size: .87rem;
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }

    .idea-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .idea-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .idea-date { color: var(--muted); font-size: .78rem; }

    .idea-actions { display: flex; gap: 6px; align-items: center; }

    .btn-roadmap {
      padding: 6px 11px;
      border-radius: 9px;
      background: rgba(89,214,165,.08);
      border: 1px solid rgba(89,214,165,.2);
      color: var(--green);
      font-size: .8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background .15s;
      cursor: pointer;
    }
    .btn-roadmap:hover { background: rgba(89,214,165,.18); transform: none; }

    /* Delete confirm inline */
    .delete-confirm {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }

    /* Prioridad badges */
    .badge.alta  { color: var(--red);    background: rgba(255,138,138,.1);  border-color: rgba(255,138,138,.3); }
    .badge.media { color: var(--yellow); background: rgba(255,209,102,.1);  border-color: rgba(255,209,102,.3); }
    .badge.baja  { color: var(--muted);  background: rgba(255,255,255,.06); border-color: var(--line);          }

    /* ── Modal sections ──────────────────────────────────── */
    .modal-section-title {
      font-size: .76rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 0 0 14px;
    }
    .modal { width: min(680px, 100%); }
  </style>
</head>
<body>

  <div class="shell">

    <!-- ── Page header ──────────────────────────────────── -->
    <div class="page-header">
      <div class="page-header-text">
        <h1>Ideas</h1>
        <p>Captura y organiza las ideas para nuevos vídeos del canal.</p>
      </div>
      <div class="page-header-actions">
        <button class="btn-primary" id="btnNuevaIdea">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva idea
        </button>
      </div>
    </div>

    <!-- ── Filtros ───────────────────────────────────────── -->
    <div class="filters-bar">
      <div class="filter-pills" id="tipoPills">
        <button class="filter-pill active" data-tipo="">Todos</button>
        <button class="filter-pill" data-tipo="arco">Arco</button>
        <button class="filter-pill" data-tipo="personaje">Personaje</button>
        <button class="filter-pill" data-tipo="tema">Tema</button>
        <button class="filter-pill" data-tipo="conexion">Conexión</button>
      </div>
      <div class="filter-spacer"></div>
      <input type="search" class="filter-search" id="searchInput" placeholder="Buscar ideas…">
    </div>

    <!-- ── Galería ───────────────────────────────────────── -->
    <div id="ideasRoot">
      <div class="loading"><div class="spinner"></div> Cargando ideas…</div>
    </div>
    <p class="ideas-count hidden" id="ideasCount"></p>

  </div><!-- .shell -->

  <!-- ══════════════════════════════════════════════════════
       Modal crear / editar idea
  ══════════════════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">

      <div class="modal-header">
        <h2 id="modalTitle">Nueva idea</h2>
        <button class="btn-icon" id="btnCloseModal" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="ideaForm">

        <!-- Básico -->
        <p class="modal-section-title">Básico</p>
        <div class="field" style="margin-bottom:12px;">
          <label for="fTitulo">Título *</label>
          <input id="fTitulo" placeholder="Ej: Por qué el inicio de One Piece es mejor de lo que recuerdas" required>
        </div>
        <div class="row-3">
          <div class="field">
            <label for="fTipo">Tipo de vídeo</label>
            <select id="fTipo">
              <option value="">— Sin tipo —</option>
              <option value="arco">Arco</option>
              <option value="personaje">Personaje</option>
              <option value="tema">Tema</option>
              <option value="conexion">Conexión</option>
            </select>
          </div>
          <div class="field">
            <label for="fSaga">Saga</label>
            <select id="fSaga"></select>
          </div>
          <div class="field">
            <label for="fArco">Arco</label>
            <select id="fArco"></select>
          </div>
        </div>

        <hr class="divider">

        <!-- Idea -->
        <p class="modal-section-title">Idea</p>
        <div class="field" style="margin-bottom:12px;">
          <label for="fIdeaTexto">Texto de la idea</label>
          <textarea id="fIdeaTexto" style="min-height:90px;" placeholder="La idea principal, el enfoque, reflexiones sueltas…"></textarea>
        </div>
        <div class="field">
          <label for="fIdeaHook">Hook inicial</label>
          <input id="fIdeaHook" placeholder="2-4 frases que enganchen al espectador desde el primer segundo…">
        </div>

        <hr class="divider">

        <!-- Editorial -->
        <p class="modal-section-title">Editorial</p>
        <div class="row-2" style="margin-bottom:12px;">
          <div class="field">
            <label for="fPrioridad">Prioridad</label>
            <select id="fPrioridad">
              <option value="Alta">Alta</option>
              <option value="Media" selected>Media</option>
              <option value="Baja">Baja</option>
            </select>
          </div>
          <div class="field">
            <label for="fTesisCentral">Tesis central</label>
            <input id="fTesisCentral" placeholder="La idea fuerte en una frase">
          </div>
        </div>
        <div class="field">
          <label for="fConexionFuturo">Conexión con el futuro</label>
          <input id="fConexionFuturo" placeholder="¿Qué conecta este vídeo con futuros vídeos del canal?">
        </div>

        <hr class="divider">

        <!-- Notas -->
        <p class="modal-section-title">Notas internas</p>
        <div class="field">
          <label for="fIdeaNotas">Notas</label>
          <textarea id="fIdeaNotas" style="min-height:80px;" placeholder="Referencias, contexto, ideas sueltas, cosas a investigar…"></textarea>
        </div>

        <div class="actions" style="margin-top:6px;">
          <button type="submit" class="btn-primary" id="btnSaveIdea">Guardar idea</button>
          <button type="button" class="btn-secondary" id="btnCancelModal">Cancelar</button>
        </div>

      </form>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       Script
  ══════════════════════════════════════════════════════ -->
  <script type="module">
    import { renderNav } from "./assets/js/utils/nav.js";
    import { requireAuth } from "./assets/js/utils/auth.js";
    requireAuth();
    import { escapeHtml, formatTimestamp, toast, truncate } from "./assets/js/utils/helpers.js";
    import { TIPO_LABELS, populateSagaSelect } from "./assets/js/config/sagas.js";
    import {
      getAllVideos, createVideo, updateVideo, deleteVideo,
      moveToStage, filterByStage
    } from "./assets/js/services/videos.js";

    renderNav();

    // ── Estado de la página ───────────────────────────────
    let allIdeas  = [];   // vídeos en fase "idea"
    let filtered  = [];   // resultado tras filtros
    let editingId = null; // null → crear; string → editar

    const filters = { tipo: "", search: "" };

    // ── Elementos DOM ─────────────────────────────────────
    const root         = document.getElementById("ideasRoot");
    const countEl      = document.getElementById("ideasCount");
    const modalOverlay = document.getElementById("modalOverlay");
    const modalTitle   = document.getElementById("modalTitle");
    const ideaForm     = document.getElementById("ideaForm");
    const fTitulo      = document.getElementById("fTitulo");
    const fTipo        = document.getElementById("fTipo");
    const fSaga        = document.getElementById("fSaga");
    const fArco        = document.getElementById("fArco");
    const fPrioridad   = document.getElementById("fPrioridad");
    const fIdeaTexto   = document.getElementById("fIdeaTexto");
    const fIdeaHook    = document.getElementById("fIdeaHook");
    const fTesisCentral  = document.getElementById("fTesisCentral");
    const fConexionFuturo = document.getElementById("fConexionFuturo");
    const fIdeaNotas   = document.getElementById("fIdeaNotas");

    // Inicializar selects de saga/arco en el modal
    populateSagaSelect(fSaga, fArco);

    // ── Carga ─────────────────────────────────────────────
    function getErrorMessage(err) {
      const code = err?.code ? ` (${err.code})` : "";
      const message = err?.message ? ` ${err.message}` : "";
      return `${code}${message}`.trim();
    }

    async function load() {
      try {
        const all = await getAllVideos();
        allIdeas  = filterByStage(all, "idea");
        applyFilters();
      } catch (err) {
        console.error("[ideas] Error al cargar datos:", err);
        const detail = getErrorMessage(err);
        root.innerHTML = `<div class="empty-state">
          <strong>No se pudieron cargar los datos</strong>
          Revisa la conexión o las reglas de Firestore.${detail ? `<br><small>${escapeHtml(detail)}</small>` : ""}
        </div>`;
        toast(`Error al cargar ideas.${detail ? ` ${escapeHtml(detail)}` : ""}`, "danger");
      }
    }

    // ── Filtros ───────────────────────────────────────────
    function applyFilters() {
      const search = filters.search.toLowerCase().trim();
      filtered = allIdeas.filter(v => {
        const matchTipo   = !filters.tipo || v.tipoVideo === filters.tipo;
        const matchSearch = !search ||
          v.titulo.toLowerCase().includes(search)       ||
          v.ideaTexto.toLowerCase().includes(search)    ||
          v.tesisCentral.toLowerCase().includes(search);
        return matchTipo && matchSearch;
      });
      render();
    }

    document.getElementById("tipoPills").addEventListener("click", e => {
      const pill = e.target.closest(".filter-pill");
      if (!pill) return;
      document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      filters.tipo = pill.dataset.tipo;
      applyFilters();
    });

    document.getElementById("searchInput").addEventListener("input", e => {
      filters.search = e.target.value;
      applyFilters();
    });

    // ── Render ────────────────────────────────────────────
    function render() {
      if (!filtered.length) {
        const hasFilters = filters.tipo || filters.search;
        root.innerHTML = `
          <div class="empty-state">
            <strong>${hasFilters ? "Sin resultados" : "No hay ideas todavía"}</strong>
            ${hasFilters
              ? "Prueba a cambiar los filtros o la búsqueda."
              : "Pulsa <strong>Nueva idea</strong> para capturar tu primera idea."}
          </div>`;
        countEl.classList.add("hidden");
        return;
      }

      root.innerHTML = `<div class="gallery-grid">${filtered.map(cardHTML).join("")}</div>`;
      countEl.textContent = `${filtered.length} idea${filtered.length !== 1 ? "s" : ""}${
        filtered.length !== allIdeas.length ? ` (de ${allIdeas.length} totales)` : ""}`;
      countEl.classList.remove("hidden");

      bindCardActions();
    }

    function tipoClass(tipoVideo) {
      return tipoVideo ? `tipo-${tipoVideo}` : "tipo-none";
    }

    function prioridadClass(p) {
      return { Alta: "alta", Media: "media", Baja: "baja" }[p] ?? "media";
    }

    function cardHTML(v) {
      const tipoLabel = TIPO_LABELS[v.tipoVideo] ?? "";
      const fecha     = formatTimestamp(v.updatedAt || v.createdAt);
      const pClass    = prioridadClass(v.prioridad);

      return `
        <article class="card idea-card ${tipoClass(v.tipoVideo)}" data-id="${v.id}">
          <div class="idea-accent"></div>
          <div class="idea-body">

            <div class="idea-meta">
              ${v.prioridad ? `<span class="badge ${pClass}">${escapeHtml(v.prioridad)}</span>` : ""}
              ${tipoLabel   ? `<span class="badge muted">${escapeHtml(tipoLabel)}</span>` : ""}
            </div>

            <h3 class="idea-title">${escapeHtml(v.titulo || "Sin título")}</h3>

            ${v.ideaHook ? `<p class="idea-hook">${escapeHtml(v.ideaHook)}</p>` : ""}
            ${v.ideaTexto ? `<p class="idea-text">${escapeHtml(v.ideaTexto)}</p>` : ""}

            ${v.saga || v.arco ? `
              <div class="idea-tags">
                ${v.saga ? `<span class="tag">${escapeHtml(v.saga)}</span>` : ""}
                ${v.arco ? `<span class="tag">${escapeHtml(v.arco)}</span>`  : ""}
              </div>` : ""}

            ${v.tesisCentral ? `
              <div style="font-size:.82rem;color:var(--muted);border-top:1px solid var(--line);padding-top:10px;line-height:1.45;">
                <span style="color:var(--accent-2);font-weight:600;">Tesis:</span>
                ${escapeHtml(truncate(v.tesisCentral, 100))}
              </div>` : ""}

          </div>
          <div class="idea-footer">
            <span class="idea-date">${fecha}</span>
            <div class="idea-actions">
              <button class="btn-roadmap js-roadmap" data-id="${v.id}" title="Mover a Roadmap">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                Roadmap
              </button>
              <button class="btn-icon js-edit" data-id="${v.id}" title="Editar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-icon js-delete-init" data-id="${v.id}" title="Eliminar" style="color:var(--red);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
              <span class="delete-confirm hidden" data-id="${v.id}">
                <button class="btn-sm btn-danger js-delete-confirm" data-id="${v.id}">Borrar</button>
                <button class="btn-sm btn-secondary js-delete-cancel">×</button>
              </span>
            </div>
          </div>
        </article>`;
    }

    // ── Bind acciones de tarjeta ──────────────────────────
    function bindCardActions() {
      // Editar
      root.querySelectorAll(".js-edit").forEach(btn => {
        btn.addEventListener("click", () => openModal(btn.dataset.id));
      });

      // Mover a Roadmap
      root.querySelectorAll(".js-roadmap").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          btn.disabled = true;
          try {
            await moveToStage(id, "roadmap");
            toast('<span class="ok">Movido a Roadmap.</span>', "ok");
            await load();
          } catch (err) {
            console.error(err);
            toast("No se pudo mover a Roadmap.", "danger");
            btn.disabled = false;
          }
        });
      });

      // Delete — primer clic muestra confirmación
      root.querySelectorAll(".js-delete-init").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          btn.classList.add("hidden");
          const confirmEl = root.querySelector(`.delete-confirm[data-id="${id}"]`);
          confirmEl.classList.remove("hidden");
          // Auto-reset tras 4 s sin confirmar
          setTimeout(() => {
            if (!confirmEl.classList.contains("hidden")) {
              confirmEl.classList.add("hidden");
              btn.classList.remove("hidden");
            }
          }, 4000);
        });
      });

      // Delete — cancelar
      root.querySelectorAll(".js-delete-cancel").forEach(btn => {
        btn.addEventListener("click", () => {
          const confirmEl = btn.closest(".delete-confirm");
          const id = confirmEl.dataset.id;
          confirmEl.classList.add("hidden");
          root.querySelector(`.js-delete-init[data-id="${id}"]`).classList.remove("hidden");
        });
      });

      // Delete — confirmar
      root.querySelectorAll(".js-delete-confirm").forEach(btn => {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          try {
            await deleteVideo(btn.dataset.id);
            toast("Idea eliminada.", "ok");
            await load();
          } catch (err) {
            console.error(err);
            toast("No se pudo eliminar.", "danger");
            btn.disabled = false;
          }
        });
      });
    }

    // ── Modal ─────────────────────────────────────────────
    function openModal(id = null) {
      editingId = id;

      if (id) {
        const v = allIdeas.find(x => x.id === id);
        if (!v) return;
        modalTitle.textContent = "Editar idea";
        fTitulo.value          = v.titulo;
        fTipo.value            = v.tipoVideo;
        populateSagaSelect(fSaga, fArco, v.saga, v.arco);
        fPrioridad.value       = v.prioridad;
        fIdeaTexto.value       = v.ideaTexto;
        fIdeaHook.value        = v.ideaHook;
        fTesisCentral.value    = v.tesisCentral;
        fConexionFuturo.value  = v.conexionFuturo;
        fIdeaNotas.value       = v.ideaNotas;
      } else {
        modalTitle.textContent = "Nueva idea";
        ideaForm.reset();
        fPrioridad.value = "Media";
        populateSagaSelect(fSaga, fArco);
      }

      modalOverlay.classList.remove("hidden");
      fTitulo.focus();
    }

    function closeModal() {
      modalOverlay.classList.add("hidden");
      editingId = null;
    }

    document.getElementById("btnNuevaIdea").addEventListener("click", () => openModal());
    document.getElementById("btnCloseModal").addEventListener("click", closeModal);
    document.getElementById("btnCancelModal").addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });

    // ── Guardar ───────────────────────────────────────────
    ideaForm.addEventListener("submit", async e => {
      e.preventDefault();
      const saveBtn = document.getElementById("btnSaveIdea");
      saveBtn.disabled = true;
      saveBtn.textContent = "Guardando…";

      const data = {
        titulo:         fTitulo.value.trim(),
        tipoVideo:      fTipo.value,
        saga:           fSaga.value,
        arco:           fArco.value,
        prioridad:      fPrioridad.value,
        ideaTexto:      fIdeaTexto.value.trim(),
        ideaHook:       fIdeaHook.value.trim(),
        tesisCentral:   fTesisCentral.value.trim(),
        conexionFuturo: fConexionFuturo.value.trim(),
        ideaNotas:      fIdeaNotas.value.trim(),
        estadoPipeline: "idea"
      };

      try {
        if (editingId) {
          await updateVideo(editingId, data);
          toast('<span class="ok">Idea actualizada.</span>', "ok");
        } else {
          await createVideo(data);
          toast('<span class="ok">Idea creada.</span>', "ok");
        }
        closeModal();
        await load();
      } catch (err) {
        console.error("[ideas] Error al guardar idea:", err);
        const detail = getErrorMessage(err);
        toast(`No se pudo guardar.${detail ? ` ${escapeHtml(detail)}` : " Revisa Firestore."}`, "danger");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Guardar idea";
      }
    });

    // ── Arranque ──────────────────────────────────────────
    load();
  </script>
</body>
</html>
