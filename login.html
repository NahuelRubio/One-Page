<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · OnePiece</title>
  <link rel="stylesheet" href="./assets/css/base.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .login-brand {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      letter-spacing: -.5px;
    }
    .login-brand span { color: var(--accent); }
    .login-subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: -.5rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    label {
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    input {
      padding: .65rem .85rem;
      border: 1.5px solid var(--line-strong);
      border-radius: 10px;
      font-size: .95rem;
      background: var(--bg-soft);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn-login {
      padding: .75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg {
      font-size: .85rem;
      color: var(--red);
      background: rgba(214,53,53,.08);
      border-radius: 8px;
      padding: .55rem .75rem;
      display: none;
      text-align: center;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">One<span>Piece</span></div>
  <p class="login-subtitle">Acceso privado al panel editorial</p>

  <div class="field">
    <label for="username">Usuario</label>
    <input id="username" type="text" placeholder="que haces aqui" autocomplete="username">
  </div>

  <div class="field">
    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos.</div>

  <button class="btn-login" id="btnLogin" onclick="login()">Entrar</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDxJr5-Sbc3tsN-iL9hbrvp5ThIkwN5iro",
    authDomain:        "onepiececanal-f8dd1.firebaseapp.com",
    projectId:         "onepiececanal-f8dd1",
    storageBucket:     "onepiececanal-f8dd1.firebasestorage.app",
    messagingSenderId: "178733003276",
    appId:             "1:178373003276:web:38f87dec2e6688cf297429"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  async function hashPassword(password) {
    const buf = await crypto.subtle.digest(
      "SHA-256",
      new TextEncoder().encode(password)
    );
    return [...new Uint8Array(buf)]
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }

  window.login = async function () {
    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("btnLogin");
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.classList.remove("visible");

    if (!username || !password) {
      errorMsg.textContent = "Rellena todos los campos.";
      errorMsg.classList.add("visible");
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Comprobando…";

    try {
      const snap = await getDoc(doc(db, "usuarios", username));

      if (!snap.exists()) {
        throw new Error("no existe");
      }

      const { passwordHash } = snap.data();
      const inputHash = await hashPassword(password);

      if (inputHash !== passwordHash) {
        throw new Error("contraseña incorrecta");
      }

      sessionStorage.setItem("auth_user", username);
      window.location.href = "index.html";

    } catch {
      errorMsg.textContent = "Usuario o contraseña incorrectos.";
      errorMsg.classList.add("visible");
      btn.disabled    = false;
      btn.textContent = "Entrar";
    }
  };

  // Permitir enviar con Enter
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") window.login();
  });

  // Si ya hay sesión activa, redirigir directamente
  if (sessionStorage.getItem("auth_user")) {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
