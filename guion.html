<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guion · OnePiece</title>
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/layout.css">

  <!-- Toast UI Editor -->
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">

  <style>
    /* ── Header del guion ─────────────────────────────────── */
    .guion-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .guion-header-text { flex: 1; min-width: 0; }
    .guion-titulo {
      margin: 0 0 10px;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      letter-spacing: -.03em;
      line-height: 1.2;
    }
    .guion-meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .guion-header-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Tesis bar ────────────────────────────────────────── */
    .tesis-bar {
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(155,123,255,.08);
      border: 1px solid rgba(155,123,255,.2);
      margin-bottom: 20px;
      font-size: .9rem;
      line-height: 1.5;
      color: var(--text);
    }
    .tesis-bar strong { color: var(--accent-2); }

    /* ── Conexion bar ─────────────────────────────────────── */
    .conexion-bar {
      font-size: .85rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 20px;
      padding-left: 4px;
    }

    /* ── Editor toolbar ───────────────────────────────────── */
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .editor-toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .version-label {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .btn-plantilla {
      padding: 9px 14px;
      border-radius: 11px;
      background: rgba(255,209,102,.08);
      border: 1px solid rgba(255,209,102,.25);
      color: var(--yellow);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    .btn-plantilla:hover { background: rgba(255,209,102,.16); transform: none; }

    /* ── Toast UI dark overrides ──────────────────────────── */

    /* Contenedor principal */
    .toastui-editor-defaultUI,
    .toastui-editor-defaultUI * { box-sizing: border-box; }

    .toastui-editor-defaultUI {
      border: 1px solid var(--line) !important;
      border-radius: 16px !important;
      overflow: hidden;
    }

    /* Toolbar */
    .toastui-editor-defaultUI .toastui-editor-toolbar {
      background: #0e1428 !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
    }

    .toastui-editor-defaultUI .toastui-editor-toolbar .toastui-editor-toolbar-icons {
      background-color: transparent !important;
      border-color: transparent !important;
      filter: invert(1) brightness(0.65) !important;
    }
    .toastui-editor-defaultUI .toastui-editor-toolbar .toastui-editor-toolbar-icons:hover {
      background-color: rgba(255,255,255,.1) !important;
      filter: invert(1) brightness(0.9) !important;
    }
    .toastui-editor-defaultUI .toastui-editor-toolbar .toastui-editor-toolbar-icons.active {
      background-color: rgba(110,168,255,.2) !important;
      filter: invert(1) brightness(1) !important;
    }

    /* Separador entre grupos */
    .toastui-editor-toolbar-divider {
      background: rgba(255,255,255,.1) !important;
    }

    /* Área de escritura */
    .toastui-editor-defaultUI .toastui-editor-ww-container,
    .toastui-editor-defaultUI .toastui-editor-md-container {
      background: #080d19 !important;
    }

    .toastui-editor-defaultUI .ProseMirror {
      color: #e0e6f5 !important;
      font-size: .95rem !important;
      line-height: 1.8 !important;
      padding: 28px 32px !important;
      min-height: 60vh;
      caret-color: #6ea8ff !important;
    }
    .toastui-editor-defaultUI .ProseMirror:focus { outline: none !important; }

    /* Placeholder */
    .toastui-editor-defaultUI .ProseMirror .placeholder { color: rgba(255,255,255,.2) !important; }

    /* Tipografía */
    .toastui-editor-contents h1,
    .toastui-editor-contents h2,
    .toastui-editor-contents h3,
    .toastui-editor-contents h4 { color: #e0e6f5 !important; font-family: inherit !important; }

    .toastui-editor-contents h1 {
      font-size: 1.55rem !important;
      margin: 1.4em 0 .5em !important;
      padding-bottom: .4em !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
    }
    .toastui-editor-contents h1:first-child { margin-top: 0 !important; }
    .toastui-editor-contents h2 {
      font-size: 1.15rem !important;
      color: #6ea8ff !important;
    }
    .toastui-editor-contents h3 {
      font-size: 1rem !important;
      color: #9b7bff !important;
    }
    .toastui-editor-contents p { color: #c8d0f0 !important; margin: 0 0 .8em !important; }
    .toastui-editor-contents strong { color: #e0e6f5 !important; font-weight: 700 !important; }
    .toastui-editor-contents em { color: #c8d0f0 !important; font-style: italic !important; }
    .toastui-editor-contents del { color: rgba(200,208,240,.5) !important; }

    .toastui-editor-contents ul,
    .toastui-editor-contents ol { color: #c8d0f0 !important; }
    .toastui-editor-contents li { color: #c8d0f0 !important; }

    .toastui-editor-contents blockquote {
      border-left: 3px solid #6ea8ff !important;
      background: rgba(110,168,255,.06) !important;
      border-radius: 0 10px 10px 0 !important;
      padding: .5em 1.2em !important;
      margin: 1em 0 !important;
    }
    .toastui-editor-contents blockquote p { color: rgba(200,208,240,.7) !important; margin: 0 !important; }

    .toastui-editor-contents code {
      background: rgba(255,255,255,.1) !important;
      color: #9b7bff !important;
      border-radius: 5px !important;
      padding: 2px 6px !important;
      font-size: .88em !important;
    }
    .toastui-editor-contents pre {
      background: rgba(255,255,255,.05) !important;
      border: 1px solid rgba(255,255,255,.08) !important;
      border-radius: 12px !important;
      padding: 16px !important;
    }
    .toastui-editor-contents pre code { background: none !important; color: #c8d0f0 !important; }

    .toastui-editor-contents hr {
      border: none !important;
      border-top: 1px solid rgba(255,255,255,.1) !important;
      margin: 1.8em 0 !important;
    }

    /* Popups y dropdowns */
    .toastui-editor-popup-body,
    .toastui-editor-dropdown-toolbar,
    .toastui-editor-context-menu {
      background: #141c35 !important;
      border: 1px solid rgba(255,255,255,.1) !important;
      border-radius: 12px !important;
    }
    .toastui-editor-popup-add-heading button,
    .toastui-editor-dropdown-toolbar button {
      color: #c8d0f0 !important;
    }
    .toastui-editor-popup-add-heading button:hover,
    .toastui-editor-dropdown-toolbar button:hover {
      background: rgba(255,255,255,.07) !important;
    }

    /* Ocultar barra inferior de modo wysiwyg/markdown */
    .toastui-editor-mode-switch { display: none !important; }

    /* ── Prompt section ───────────────────────────────────── */
    .prompt-section { margin-top: 28px; }
    .prompt-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }
    .prompt-toggle:hover { color: var(--text); }
    .prompt-toggle svg { transition: transform .2s; }
    .prompt-toggle.open svg { transform: rotate(90deg); }
    .prompt-body {
      padding: 20px;
      margin-top: 2px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      font-size: .83rem;
      line-height: 1.7;
      color: var(--muted);
      white-space: pre-wrap;
      font-family: inherit;
    }
    .prompt-body strong { color: var(--accent); font-family: inherit; }

    /* Estado select */
    .estado-select-inline {
      padding: 6px 28px 6px 10px;
      border-radius: 9px;
      font-size: .84rem;
      width: auto;
    }

    .btn-calendario {
      padding: 9px 14px;
      border-radius: 11px;
      background: rgba(89,214,165,.08);
      border: 1px solid rgba(89,214,165,.2);
      color: var(--green);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    .btn-calendario:hover { background: rgba(89,214,165,.16); transform: none; }

    @media (max-width: 700px) {
      .toastui-editor-contents { padding: 18px 16px !important; }
      .guion-header { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="shell" id="mainShell">
    <div class="loading"><div class="spinner"></div> Cargando guion…</div>
  </div>

  <!-- Toast UI Editor (UMD, antes del módulo) -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

  <script type="module">
    import { renderNav } from "./assets/js/utils/nav.js";
    import { requireAuth } from "./assets/js/utils/auth.js";
    requireAuth();
    import { getParam, escapeHtml, formatTimestamp, toast } from "./assets/js/utils/helpers.js";
    import { TIPO_LABELS, GUION_LABELS } from "./assets/js/config/sagas.js";
    import { getTemplate, buildPrompt } from "./assets/js/config/plantillas.js";
    import {
      getVideo, updateVideo, saveGuionMarkdown, moveToStage
    } from "./assets/js/services/videos.js";

    renderNav();

    const videoId = getParam("id");
    let video     = null;
    let editor    = null; // instancia Toast UI
    let isDirty   = false;

    const shell = document.getElementById("mainShell");

    // ── Carga ─────────────────────────────────────────────
    async function load() {
      if (!videoId) {
        shell.innerHTML = `
          <div class="empty-state" style="padding:60px 20px;">
            <strong>No se especificó un vídeo.</strong>
            <a href="guiones.html" style="color:var(--accent);margin-top:12px;display:inline-block;">← Ir a Guiones</a>
          </div>`;
        return;
      }

      try {
        video = await getVideo(videoId);
        if (!video) {
          shell.innerHTML = `
            <div class="empty-state" style="padding:60px 20px;">
              <strong>Vídeo no encontrado.</strong>
              <a href="guiones.html" style="color:var(--accent);margin-top:12px;display:inline-block;">← Ir a Guiones</a>
            </div>`;
          return;
        }

        document.title = `${video.titulo || "Guion"} · OnePiece`;
        render();
      } catch (err) {
        console.error(err);
        shell.innerHTML = `<div class="empty-state"><strong>Error al cargar el guion.</strong></div>`;
        toast("Error al cargar el guion.", "danger");
      }
    }

    // ── Render ────────────────────────────────────────────
    function render() {
      const tipoLabel = TIPO_LABELS[video.tipoVideo] ?? "";
      const fecha     = formatTimestamp(video.guionUltimaEdicion || video.updatedAt);

      shell.innerHTML = `

        <!-- ── Cabecera ────────────────────────────────────── -->
        <div class="guion-header">
          <div class="guion-header-text">
            <div style="margin-bottom:10px;">
              <a href="guiones.html" class="btn-secondary btn-sm" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                Guiones
              </a>
            </div>
            <h1 class="guion-titulo">${escapeHtml(video.titulo || "Sin título")}</h1>
            <div class="guion-meta-row">
              <select class="estado-select-inline js-estado-select">
                <option value="sin_empezar"${video.guionEstado === "sin_empezar" ? " selected" : ""}>Sin empezar</option>
                <option value="en_progreso"${video.guionEstado === "en_progreso" ? " selected" : ""}>En progreso</option>
                <option value="listo"${video.guionEstado === "listo" ? " selected" : ""}>Listo</option>
              </select>
              ${tipoLabel ? `<span class="badge muted">${escapeHtml(tipoLabel)}</span>` : ""}
              ${video.saga ? `<span class="tag">${escapeHtml(video.saga)}</span>` : ""}
              ${video.arco ? `<span class="tag">${escapeHtml(video.arco)}</span>`  : ""}
              ${video.prioridad ? `<span class="tag">${escapeHtml(video.prioridad)}</span>` : ""}
            </div>
          </div>
          <div class="guion-header-actions">
            <button class="btn-calendario js-btn-calendario" title="Mover a Calendario">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              → Calendario
            </button>
          </div>
        </div>

        <!-- ── Tesis ───────────────────────────────────────── -->
        ${video.tesisCentral ? `
          <div class="tesis-bar">
            <strong>Tesis:</strong> ${escapeHtml(video.tesisCentral)}
          </div>` : ""}
        ${video.conexionFuturo ? `
          <p class="conexion-bar">Conexión: ${escapeHtml(video.conexionFuturo)}</p>
        ` : ""}

        <!-- ── Toolbar ────────────────────────────────────── -->
        <div class="editor-toolbar">
          ${fecha !== "—" ? `<span class="version-label">v${video.guionVersion || 1} · ${fecha}</span>` : ""}
          <div class="editor-toolbar-right">
            <button class="btn-plantilla js-btn-plantilla" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
              </svg>
              Generar plantilla
            </button>
            <button class="btn-primary btn-sm js-btn-save" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
              Guardar
            </button>
          </div>
        </div>

        <!-- ── Editor WYSIWYG ─────────────────────────────── -->
        <div id="editorMount"></div>

        <!-- ── Prompt base ─────────────────────────────────── -->
        <div class="prompt-section">
          <div class="prompt-toggle" id="promptToggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            Prompt base del canal (adaptado a este vídeo)
            <button class="btn-secondary btn-sm" id="btnCopyPrompt" style="margin-left:auto;font-size:.78rem;padding:5px 10px;" type="button">Copiar</button>
          </div>
          <pre class="prompt-body hidden" id="promptBody">${escapeHtml(buildPrompt(video))}</pre>
        </div>
      `;

      initEditor();
      bindActions();
    }

    // ── Inicializar Toast UI Editor ───────────────────────
    function initEditor() {
      const { Editor } = toastui;

      editor = new Editor({
        el: document.getElementById("editorMount"),
        initialEditType: "wysiwyg",
        previewStyle: "tab",
        height: "auto",
        minHeight: "60vh",
        initialValue: video.guionMarkdown || "",
        placeholder: "Empieza a escribir tu guion…\n\nUsa # para títulos, **negrita**, *cursiva*, > para citas…",
        hideModeSwitch: true,
        toolbarItems: [
          ["heading", "bold", "italic", "strike"],
          ["hr", "quote"],
          ["ul", "ol"],
          ["indent", "outdent"],
          ["scrollSync"],
        ],
        events: {
          change: () => { isDirty = true; },
        },
      });
    }

    // ── Bind acciones ─────────────────────────────────────
    function bindActions() {
      // Guardar
      document.querySelector(".js-btn-save")?.addEventListener("click", saveGuion);

      // Generar plantilla
      document.querySelector(".js-btn-plantilla")?.addEventListener("click", () => {
        const template = getTemplate(video);
        const current  = editor.getMarkdown().trim();
        if (!current) {
          editor.setMarkdown(template);
        } else {
          editor.setMarkdown(current + "\n\n---\n\n" + template);
        }
        isDirty = true;
        toast("Plantilla insertada.", "ok");
      });

      // Estado select
      document.querySelector(".js-estado-select")?.addEventListener("change", async e => {
        try {
          await updateVideo(videoId, { guionEstado: e.target.value });
          video.guionEstado = e.target.value;
          toast('<span class="ok">Estado actualizado.</span>', "ok");
        } catch (err) {
          console.error(err);
          toast("Error al actualizar el estado.", "danger");
        }
      });

      // Mover a Calendario
      document.querySelector(".js-btn-calendario")?.addEventListener("click", async () => {
        const btn = document.querySelector(".js-btn-calendario");
        btn.disabled = true;
        try {
          const markdown = editor.getMarkdown();
          if (markdown !== video.guionMarkdown) {
            await saveGuionMarkdown(videoId, markdown, video);
          }
          await moveToStage(videoId, "calendario");
          toast('<span class="ok">Movido a Calendario.</span>', "ok");
          setTimeout(() => { window.location.href = "guiones.html"; }, 800);
        } catch (err) {
          console.error(err);
          toast("Error al mover a Calendario.", "danger");
          btn.disabled = false;
        }
      });

      // Prompt toggle
      document.getElementById("promptToggle")?.addEventListener("click", e => {
        if (e.target.closest("#btnCopyPrompt")) return;
        const toggle = document.getElementById("promptToggle");
        const body   = document.getElementById("promptBody");
        const isOpen = !body.classList.contains("hidden");
        body.classList.toggle("hidden", isOpen);
        toggle.classList.toggle("open", !isOpen);
      });

      // Copiar prompt
      document.getElementById("btnCopyPrompt")?.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(buildPrompt(video));
          toast('<span class="ok">Prompt copiado al portapapeles.</span>', "ok");
        } catch {
          toast("No se pudo copiar. Copia el texto manualmente.", "warn");
        }
      });
    }

    // ── Guardar ───────────────────────────────────────────
    async function saveGuion() {
      const saveBtn  = document.querySelector(".js-btn-save");
      const markdown = editor.getMarkdown();

      saveBtn.disabled    = true;
      saveBtn.textContent = "Guardando…";

      try {
        await saveGuionMarkdown(videoId, markdown, video);
        video.guionMarkdown = markdown;
        video.guionVersion  = (video.guionVersion || 1) + 1;
        isDirty = false;
        toast('<span class="ok">Guion guardado.</span>', "ok");
        const vl = document.querySelector(".version-label");
        if (vl) vl.textContent = `v${video.guionVersion} · Ahora mismo`;
      } catch (err) {
        console.error(err);
        toast("Error al guardar. Revisa Firestore.", "danger");
      } finally {
        saveBtn.disabled    = false;
        saveBtn.innerHTML   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar`;
      }
    }

    // ── Advertir al salir con cambios ─────────────────────
    window.addEventListener("beforeunload", e => {
      if (isDirty) { e.preventDefault(); e.returnValue = ""; }
    });

    load();
  </script>
</body>
</html>
